<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fafafa; }
        .dashboard { max-width: 800px; margin: 40px auto; background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #eaeaea; }
        .summary-box { background: #e8f5e9; padding: 15px; border-radius: 8px; color: #2e7d32; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container dashboard">
        <h2 class="mb-4">💰 Expense Tracker</h2>
        
        <div class="row mb-4">
            <div class="col-md-4">
                <input type="text" class="form-control" placeholder="Expense Item (e.g. Lunch)">
            </div>
            <div class="col-md-3">
                <input type="number" class="form-control" placeholder="Amount (₹)">
            </div>
            <div class="col-md-3">
                <select class="form-select">
                    <option>Food</option>
                    <option>Travel</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-success w-100">Add</button>
            </div>
        </div>

        <div class="summary-box text-center mb-4">
            Total Expense: ₹0 (Logic runs in Python)
        </div>

        <table class="table table-bordered">
            <thead class="table-light">
                <tr>
                    <th>Item</th>
                    <th>Category</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="3" class="text-center text-muted">Run tracker.py in terminal to process expenses</td></tr>
            </tbody>
        </table>
    </div>
</body>
</html>
